<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CreatorNest</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        body { background:#080808; color:white; font-family:sans-serif; padding:15px; }
        .wallet { background:linear-gradient(45deg, #FFD700, #b8860b); color:black; padding:20px; border-radius:15px; text-align:center; margin-bottom:20px; }
        .box { background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; border:1px solid #333; margin-bottom:20px; }
        input { width:100%; padding:10px; margin:8px 0; background:#111; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box; }
        .btn-w { background:#FFD700; color:black; border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #222; }
        .status-paid { color: #00ff88; font-weight: bold; }
        .status-pending { color: #ff4b5c; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="color:#FFD700; margin:0;">Dashboard</h2>
        <button onclick="localStorage.clear(); window.location.href='login.html';" style="background:none; border:1px solid #ff4b5c; color:#ff4b5c; padding:5px 10px; border-radius:5px;">Logout</button>
    </div>

    <div class="wallet">
        <p style="margin:0;">Welcome, <span id="userName">...</span></p>
        <h1 style="margin:5px 0;">₹<span id="userBalance">0</span></h1>
    </div>

    <div class="box">
        <h3>Withdraw Payout 💸</h3>
        <p style="font-size: 11px; color: #888;">Min Withdrawal: ₹300</p>
        <input type="number" id="wAmt" placeholder="Amount (Min 300)">
        <input type="text" id="wUpi" placeholder="UPI ID">
        <button class="btn-w" onclick="withdraw()">SEND REQUEST</button>
    </div>

    <div class="box">
        <h3 style="color:#FFD700;">History 📜</h3>
        <table>
            <thead><tr><th>Amount</th><th>Status</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNOjenPLwHeo0YGManiQP7qu76y6LgdYQ",
            authDomain: "creator-nest-7fb3a.firebaseapp.com",
            projectId: "creator-nest-7fb3a",
            appId: "1:1019440836188:web:530fdfb5732be69b7bc099"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const phone = localStorage.getItem("userPhone");
        if(!phone) window.location.href="login.html";

        db.collection("agents").doc(phone).onSnapshot((doc) => {
            if(doc.exists) {
                document.getElementById('userName').innerText = doc.data().name;
                document.getElementById('userBalance').innerText = doc.data().balance;
            }
        });

        db.collection("withdrawals").where("phone", "==", phone).onSnapshot((snap) => {
            let html = "";
            snap.forEach(doc => {
                let w = doc.data();
                let sClass = (w.status === 'paid' || w.status === 'completed') ? 'status-paid' : 'status-pending';
                let sText = (w.status === 'paid' || w.status === 'completed') ? 'PAID' : 'PENDING';
                html += `<tr><td>₹${w.amount}</td><td class="${sClass}">${sText}</td></tr>`;
            });
            document.getElementById('historyBody').innerHTML = html || "<tr><td colspan='2'>No records</td></tr>";
        });

        function withdraw() {
            const amt = parseInt(document.getElementById('wAmt').value);
            const upi = document.getElementById('wUpi').value;
            const bal = parseInt(document.getElementById('userBalance').innerText);
            if(amt >= 300 && amt <= bal && upi) {
                db.collection("withdrawals").add({ phone: phone, name: document.getElementById('userName').innerText, amount: amt, upi: upi, status: "pending", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                alert("Request Sent!");
                document.getElementById('wAmt').value = ""; document.getElementById('wUpi').value = "";
            } else { alert("Check Amount (Min 300) or Balance!"); }
        }
    </script>
</body>
</html>
