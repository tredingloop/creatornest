<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | CreatorNest</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #0f111a; --card: #1a1d29; --green: #00ff88; --red: #ff4b5c; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding-top: 60px; }
        .sidebar { width: 260px; background: #000; height: 100vh; position: fixed; left: -260px; top: 0; transition: 0.3s; z-index: 2000; border-right: 1px solid #333; }
        .sidebar.active { left: 0; }
        .sidebar-content { padding: 30px 20px; }
        .nav-link { display: block; color: #888; text-decoration: none; padding: 12px; border-bottom: 1px solid #222; }
        .mobile-header { display: flex; background: #000; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 1500; border-bottom: 1px solid #333; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .main { padding: 20px; width: 100%; box-sizing: border-box; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border-bottom: 3px solid var(--gold); }
        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; font-size: 13px; }
        th { background: #252936; color: var(--gold); padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #2d3244; }
        .btn-ap { background: var(--green); color: black; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; }
        .btn-add { background: var(--gold); color: black; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; }
        .input-m { background: #000; border: 1px solid #444; color: white; padding: 5px; border-radius: 4px; width: 50px; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <h2 style="color:var(--gold)">CreatorNest</h2>
            <a href="#" class="nav-link" onclick="toggleS()">Dashboard</a>
            <a href="#" class="nav-link" onclick="toggleS()">Close ×</a>
            <p style="margin-top:40px; font-size:11px; color:#444">Managing Director Control</p>
        </div>
    </div>
    <div class="mobile-header"><button onclick="toggleS()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">MENU</button><span style="color:var(--gold); font-weight:bold;">Admin Master</span></div>
    <div class="main">
        <div class="stats-grid">
            <div class="stat-card"><p>Agents</p><h2 id="tA">0</h2></div>
            <div class="stat-card"><p>Volume</p><h2 id="tV" style="color:var(--green)">₹0</h2></div>
        </div>
        <h3 style="color:var(--gold)">Agents</h3>
        <div class="table-container"><table><thead><tr><th>Name</th><th>UTR</th><th>Balance</th><th>Action</th></tr></thead><tbody id="aT"></tbody></table></div>
        <h3 style="color:var(--gold)">Withdrawals</h3>
        <div class="table-container"><table><thead><tr><th>Name</th><th>Amount</th><th>UPI</th><th>Action</th></tr></thead><tbody id="wT"></tbody></table></div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNOjenPLwHeo0YGManiQP7qu76y6LgdYQ",
            authDomain: "creator-nest-7fb3a.firebaseapp.com",
            projectId: "creator-nest-7fb3a",
            appId: "1:1019440836188:web:530fdfb5732be69b7bc099"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        function toggleS() { document.getElementById('sidebar').classList.toggle('active'); }

        db.collection("agents").onSnapshot((snap) => {
            let h = ""; let total = 0, vol = 0;
            snap.forEach(doc => {
                let u = doc.data(); total++; vol += (u.balance || 0);
                h += `<tr><td>${u.name}</td><td>${u.txnId}</td><td style="color:var(--gold)">₹${u.balance}</td>
                <td>${u.status === 'pending' ? `<button onclick="ap('${doc.id}')" class="btn-ap">Approve</button>` : 
                `<input type="number" id="m-${doc.id}" class="input-m"> <button onclick="ad('${doc.id}')" class="btn-add">Add</button>`}</td></tr>`;
            });
            document.getElementById('aT').innerHTML = h; document.getElementById('tA').innerText = total; document.getElementById('tV').innerText = "₹" + vol;
        });

        db.collection("withdrawals").where("status","==","pending").onSnapshot((snap) => {
            let h = "";
            snap.forEach(doc => {
                let w = doc.data();
                h += `<tr><td>${w.name}</td><td style="color:var(--green)">₹${w.amount}</td><td><code>${w.upi}</code></td>
                <td><button onclick="py('${doc.id}','${w.phone}',${w.amount})" class="btn-ap">Paid ✅</button></td></tr>`;
            });
            document.getElementById('wT').innerHTML = h;
        });

        function ap(id) { db.collection("agents").doc(id).update({status:"active"}); }
        function ad(id) { let a = parseInt(document.getElementById('m-'+id).value); if(a) db.collection("agents").doc(id).update({balance: firebase.firestore.FieldValue.increment(a)}); }
        function py(id, ph, am) { if(confirm("Confirm Paid?")){ db.collection("agents").doc(ph).update({balance: firebase.firestore.FieldValue.increment(-am)}); db.collection("withdrawals").doc(id).update({status:"paid"}); }}
    </script>
</body>
</html>
